    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            color: #1e293b;
        }

        #app {
            height: 100vh;
            overflow: hidden;
        }

        /* Oud header — verborgen maar actief voor JS state management */
        #app-header {
            display: none;
        }

        /* Nieuwe layout — sidebar is position:fixed, main gebruikt margin */
        #tz-app-layout {
            height: 100vh;
            overflow: hidden;
        }

        /* #app-sidebar is een lege wrapper (geen afmetingen) — de echte sidebar is position:fixed */
        #app-sidebar {
            flex-shrink: 0;
            width: 0;
        }

        #app-main {
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            margin-left: 52px; /* breedte ingeklapte sidebar */
            transition: margin-left 0.22s ease;
        }

        #app-main.sidebar-expanded {
            margin-left: 224px; /* breedte uitgeklapte sidebar */
        }

        #app-topbar {
            flex-shrink: 0;
        }

        #app-phase-tabs {
            flex-shrink: 0;
        }

        #app-content {
            flex: 1;
            width: 100%;
            padding: 20px;
            overflow-y: auto;
            overflow-x: auto;
        }

        .loading-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            flex-direction: column;
            gap: 20px;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #e2e8f0;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #app.loaded .loading-screen {
            display: none;
        }
    </style>
</head>

<body>
    <div id="app">
        <!-- Verborgen oud header — JS state management blijft actief -->
        <div id="app-header"></div>

        <!-- Nieuwe sidebar layout -->
        <div id="tz-app-layout">
            <div id="app-sidebar"></div>
            <div id="app-main">
                <div id="app-topbar"></div>
                <div id="app-phase-tabs"></div>
                <div id="app-content">
                    <div class="loading-screen">
                        <div class="loading-spinner"></div>
                        <p>TenderPlanner wordt geladen...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
